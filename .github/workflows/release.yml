name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 26.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "ver=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.ref_name }}" ]; then
            echo "ver=${{ github.ref_name#v }}" >> "$GITHUB_OUTPUT"
          else
            echo "ver=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.ver }}" -o dist/speedtest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/speedtest/
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: speedtest-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/speedtest-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "ver=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.ref_name }}" ]; then
            echo "ver=${{ github.ref_name#v }}" >> "$GITHUB_OUTPUT"
          else
            echo "ver=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.ver }}
          name: v${{ steps.version.outputs.ver }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/**/*
